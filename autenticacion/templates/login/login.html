<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartWallet — Iniciar sesión</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; background: #f0eeff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; padding: 2rem 1rem; position: relative; overflow: hidden; }
        .blob { position: fixed; border-radius: 50%; background: #d8d1fb; z-index: 0; }
        .blob-1 { width: 320px; height: 320px; bottom: -100px; left: -100px; }
        .blob-2 { width: 220px; height: 220px; top: -40px; right: -60px; }
        .blob-3 { width: 100px; height: 100px; top: 50%; right: 80px; opacity: 0.4; }
        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 1.75rem; z-index: 1; }
        .logo-icon { width: 44px; height: 44px; background: #6c63ff; border-radius: 11px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 24px; }
        .logo-text { font-size: 24px; font-weight: 600; color: #1a1a2e; }
        .logo-text span { color: #6c63ff; }
        .card { background: #fff; border-radius: 18px; padding: 2.25rem 2rem; width: 100%; max-width: 430px; z-index: 1; box-shadow: 0 4px 24px rgba(108, 99, 255, 0.08); }
        .card h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; text-align: center; margin-bottom: 4px; }
        .card .subtitle { font-size: 14px; color: #888; text-align: center; margin-bottom: 1.75rem; }
        .field { margin-bottom: 1rem; }
        .field label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
        .input-wrap { display: flex; align-items: center; border: 1.5px solid #e0dffe; border-radius: 9px; padding: 0 12px; gap: 10px; background: #fff; transition: border-color 0.2s, box-shadow 0.2s; }
        .input-wrap:focus-within { border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.13); }
        .input-wrap i { color: #bbb; font-size: 18px; flex-shrink: 0; }
        .input-wrap input { border: none; outline: none; font-size: 14px; color: #333; padding: 11px 0; flex: 1; background: transparent; font-family: inherit; }
        .toggle-pw { background: none; border: none; cursor: pointer; color: #bbb; padding: 0; font-size: 18px; display: flex; align-items: center; }
        .btn-primary { width: 100%; padding: 13px; background: #6c63ff; color: #fff; font-size: 15px; font-weight: 600; border: none; border-radius: 9px; cursor: pointer; transition: background 0.2s; }
        .btn-primary:hover { background: #574fd6; }
        .divider { display: flex; align-items: center; gap: 10px; margin: 1.25rem 0; color: #ccc; font-size: 13px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #ebebeb; }
        .btn-google { width: 100%; padding: 12px; background: #fff; border: 1.5px solid #e0dffe; border-radius: 9px; font-size: 14px; font-weight: 600; color: #333; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .footer { margin-top: 1.5rem; font-size: 13px; color: #888; z-index: 1; text-align: center; }
        .footer a { color: #6c63ff; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="logo">
        <div class="logo-icon"><i class="ti ti-wallet"></i></div>
        <span class="logo-text">Smart<span>Wallet</span></span>
    </div>

    <form method="post" class="card" action="{% url 'login' %}">
        {% csrf_token %}
        <h1>Bienvenido de nuevo</h1>
        
        {% if messages %}
            {% for message in messages %}
                <div style="color: #e24b4a; text-align: center; margin-bottom: 1rem; font-size: 14px;">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <p class="subtitle">Ingresa a tu cuenta para continuar</p>

        <div class="field">
            <label for="email">Correo electrónico</label>
            <div class="input-wrap">
                <i class="ti ti-mail"></i>
                <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com" autocomplete="email" />
            </div>
        </div>

        <div class="field">
            <label for="password">Contraseña</label>
            <div class="input-wrap">
                <i class="ti ti-lock"></i>
                <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña" autocomplete="current-password" />
                <button class="toggle-pw" id="toggle-pw" type="button">
                    <i class="ti ti-eye" id="eye-icon"></i>
                </button>
            </div>
        </div>

        <div class="forgot"><a href="#">¿Olvidaste tu contraseña?</a></div>

        <button class="btn-primary" type="submit">Iniciar sesión</button>

        <div class="divider">o continúa con</div>
        <button class="btn-google" type="button">Continuar con Google</button>
    </form>

    <p class="footer">¿No tienes una cuenta? <a href="#">Regístrate</a></p>

    <script>
        // Solo dejamos la lógica de visibilidad de contraseña
        const toggleBtn = document.getElementById('toggle-pw');
        const pwInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        let pwVisible = false;

        toggleBtn.addEventListener('click', () => {
            pwVisible = !pwVisible;
            pwInput.type = pwVisible ? 'text' : 'password';
            eyeIcon.className = pwVisible ? 'ti ti-eye-off' : 'ti ti-eye';
        });
    </script>
</body>
</html>
